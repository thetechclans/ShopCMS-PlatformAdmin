name: Supabase Daily Backup

on:
  schedule:
    - cron: "0 1 * * *"
  workflow_dispatch:

jobs:
  backup:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
      BACKUP_DIR: artifacts/backups
      RETENTION_COUNT: 35
      BACKUP_S3_PREFIX: daily
      PG_DUMP_BIN: /usr/lib/postgresql/17/bin/pg_dump
      PG_RESTORE_BIN: /usr/lib/postgresql/17/bin/pg_restore
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: ${{ secrets.AWS_DEFAULT_REGION }}
      BACKUP_S3_BUCKET: ${{ secrets.BACKUP_S3_BUCKET }}
      S3_ENDPOINT_URL: ${{ secrets.S3_ENDPOINT_URL }}
      S3_FORCE_PATH_STYLE: ${{ secrets.S3_FORCE_PATH_STYLE }}
      BACKUP_NOTIFICATION_WEBHOOK: ${{ secrets.BACKUP_NOTIFICATION_WEBHOOK }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y curl ca-certificates gnupg lsb-release zstd jq coreutils
          curl -fsSL https://www.postgresql.org/media/keys/ACCC4CF8.asc | sudo gpg --dearmor -o /usr/share/keyrings/postgresql.gpg
          echo "deb [signed-by=/usr/share/keyrings/postgresql.gpg] http://apt.postgresql.org/pub/repos/apt $(. /etc/os-release && echo $VERSION_CODENAME)-pgdg main" | sudo tee /etc/apt/sources.list.d/pgdg.list > /dev/null
          sudo apt-get update
          sudo apt-get install -y postgresql-client-17
          ${PG_DUMP_BIN} --version

      - name: Run logical backup script
        id: backup
        run: |
          BACKUP_FILE="$(bash scripts/ops/backup_supabase_db.sh)"
          echo "backup_file=${BACKUP_FILE}" >> "$GITHUB_OUTPUT"
          echo "backup_name=$(basename "${BACKUP_FILE}")" >> "$GITHUB_OUTPUT"

      - name: Verify backup integrity
        id: verify
        run: |
          TMP_DUMP="$(mktemp /tmp/shopcms_verify_XXXXXX.dump)"
          trap 'rm -f "${TMP_DUMP}"' EXIT

          zstd --quiet --decompress --stdout "${{ steps.backup.outputs.backup_file }}" > "${TMP_DUMP}"
          ${PG_RESTORE_BIN} --list "${TMP_DUMP}" > /dev/null

          CHECKSUM_FILE="${{ steps.backup.outputs.backup_file }}.sha256"
          (cd "$(dirname "${{ steps.backup.outputs.backup_file }}")" && sha256sum "$(basename "${{ steps.backup.outputs.backup_file }}")") > "${CHECKSUM_FILE}"

          echo "checksum_file=${CHECKSUM_FILE}" >> "$GITHUB_OUTPUT"

      - name: Upload backup to S3
        if: ${{ env.BACKUP_S3_BUCKET != '' && env.AWS_ACCESS_KEY_ID != '' && env.AWS_SECRET_ACCESS_KEY != '' && env.AWS_DEFAULT_REGION != '' }}
        run: |
          AWS_ARGS=()
          if [[ -n "${S3_ENDPOINT_URL}" ]]; then
            AWS_ARGS+=(--endpoint-url "${S3_ENDPOINT_URL}")
          fi
          if [[ "${S3_FORCE_PATH_STYLE,,}" == "true" ]]; then
            aws configure set default.s3.addressing_style path
          fi

          aws "${AWS_ARGS[@]}" s3 cp \
            "${{ steps.backup.outputs.backup_file }}" \
            "s3://${BACKUP_S3_BUCKET}/${BACKUP_S3_PREFIX}/${{ steps.backup.outputs.backup_name }}"

          aws "${AWS_ARGS[@]}" s3 cp \
            "${{ steps.verify.outputs.checksum_file }}" \
            "s3://${BACKUP_S3_BUCKET}/${BACKUP_S3_PREFIX}/${{ steps.backup.outputs.backup_name }}.sha256"

      - name: Apply S3 retention policy (keep 35 daily backups)
        if: ${{ env.BACKUP_S3_BUCKET != '' && env.AWS_ACCESS_KEY_ID != '' && env.AWS_SECRET_ACCESS_KEY != '' && env.AWS_DEFAULT_REGION != '' }}
        run: |
          AWS_ARGS=()
          if [[ -n "${S3_ENDPOINT_URL}" ]]; then
            AWS_ARGS+=(--endpoint-url "${S3_ENDPOINT_URL}")
          fi
          if [[ "${S3_FORCE_PATH_STYLE,,}" == "true" ]]; then
            aws configure set default.s3.addressing_style path
          fi

          mapfile -t backup_keys < <(
            aws "${AWS_ARGS[@]}" s3api list-objects-v2 \
              --bucket "${BACKUP_S3_BUCKET}" \
              --prefix "${BACKUP_S3_PREFIX}/" \
              --query 'sort_by(Contents,&LastModified)[].Key' \
              --output text | tr '\t' '\n' | sed '/^None$/d;/^$/d' | grep -E '\.dump\.zst$' || true
          )

          if (( ${#backup_keys[@]} > RETENTION_COUNT )); then
            for old_backup_key in "${backup_keys[@]:0:${#backup_keys[@]}-RETENTION_COUNT}"; do
              aws "${AWS_ARGS[@]}" s3 rm "s3://${BACKUP_S3_BUCKET}/${old_backup_key}"
              aws "${AWS_ARGS[@]}" s3 rm "s3://${BACKUP_S3_BUCKET}/${old_backup_key}.sha256" || true
            done
          fi

      - name: Upload backup artifact to workflow run
        uses: actions/upload-artifact@v4
        with:
          name: supabase-daily-backup-${{ github.run_id }}
          path: |
            ${{ steps.backup.outputs.backup_file }}
            ${{ steps.verify.outputs.checksum_file }}
          retention-days: 21

      - name: Notify on failure
        if: failure()
        run: |
          if [[ -z "${BACKUP_NOTIFICATION_WEBHOOK}" ]]; then
            echo "BACKUP_NOTIFICATION_WEBHOOK is not configured; skipping notification."
            exit 0
          fi

          payload=$(jq -n \
            --arg repo "${{ github.repository }}" \
            --arg run_id "${{ github.run_id }}" \
            --arg workflow "${{ github.workflow }}" \
            '{text: ("Supabase daily backup failed for " + $repo + " in workflow " + $workflow + " (run " + $run_id + ").")}'
          )

          curl -sS -X POST \
            -H "Content-Type: application/json" \
            -d "${payload}" \
            "${BACKUP_NOTIFICATION_WEBHOOK}"
